
<style>
  .pg-wrap { padding: 1.5rem 0; max-width: 560px; margin: 0 auto; }
  .pg-output {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-lg);
    padding: 14px 16px;
    margin-bottom: 1rem;
    gap: 12px;
  }
  .pg-password {
    font-family: var(--font-mono);
    font-size: 15px;
    color: var(--color-text-primary);
    word-break: break-all;
    flex: 1;
    letter-spacing: 0.04em;
  }
  .pg-copy {
    flex-shrink: 0;
    background: none;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 6px 12px;
    font-size: 13px;
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .pg-copy:hover { background: var(--color-background-tertiary); color: var(--color-text-primary); }
  .pg-strength {
    margin-bottom: 1.25rem;
  }
  .pg-strength-bar {
    height: 6px;
    border-radius: 999px;
    background: var(--color-border-tertiary);
    overflow: hidden;
    margin-bottom: 6px;
  }
  .pg-strength-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.35s ease, background 0.35s ease;
  }
  .pg-strength-label {
    font-size: 13px;
    color: var(--color-text-secondary);
  }
  .pg-strength-label span { font-weight: 500; }
  .pg-section { margin-bottom: 1.25rem; }
  .pg-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .pg-label { font-size: 14px; color: var(--color-text-secondary); }
  .pg-val { font-size: 14px; font-weight: 500; color: var(--color-text-primary); min-width: 28px; text-align: right; }
  input[type=range] { flex: 1; margin: 0 12px; }
  .pg-toggles { display: flex; flex-direction: column; gap: 10px; }
  .pg-toggle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    cursor: pointer;
    transition: border-color 0.15s;
    user-select: none;
  }
  .pg-toggle:hover { border-color: var(--color-border-secondary); }
  .pg-toggle-label { font-size: 14px; color: var(--color-text-primary); }
  .pg-toggle-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 1px; }
  .pg-switch {
    width: 38px; height: 22px; border-radius: 999px;
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-tertiary);
    position: relative; flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s;
  }
  .pg-switch::after {
    content: '';
    position: absolute; top: 3px; left: 3px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--color-text-tertiary);
    transition: transform 0.2s, background 0.2s;
  }
  .pg-switch.on { background: #1D9E75; border-color: #1D9E75; }
  .pg-switch.on::after { transform: translateX(16px); background: #fff; }
  .pg-regen {
    width: 100%; padding: 11px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-primary);
    font-size: 14px; color: var(--color-text-primary);
    cursor: pointer; margin-top: 1rem;
    transition: background 0.15s;
  }
  .pg-regen:hover { background: var(--color-background-secondary); }
  .pg-metrics {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    margin-bottom: 1.25rem;
  }
  .pg-metric {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: 10px;
    text-align: center;
  }
  .pg-metric-num { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
  .pg-metric-lbl { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
</style>

<div class="pg-wrap">
  <div class="pg-output">
    <div class="pg-password" id="pw">Generating...</div>
    <button class="pg-copy" id="copyBtn" onclick="copyPw()">Copy</button>
  </div>

  <div class="pg-strength">
    <div class="pg-strength-bar"><div class="pg-strength-fill" id="sBar" style="width:0%;background:#ccc"></div></div>
    <div class="pg-strength-label">Strength: <span id="sLabel">—</span></div>
  </div>

  <div class="pg-metrics">
    <div class="pg-metric"><div class="pg-metric-num" id="mEntropy">0</div><div class="pg-metric-lbl">bits entropy</div></div>
    <div class="pg-metric"><div class="pg-metric-num" id="mPool">0</div><div class="pg-metric-lbl">char pool</div></div>
    <div class="pg-metric"><div class="pg-metric-num" id="mTime">0</div><div class="pg-metric-lbl">crack estimate</div></div>
  </div>

  <div class="pg-section">
    <div class="pg-row">
      <span class="pg-label">Length</span>
      <input type="range" min="6" max="64" value="16" step="1" id="lenSlider" oninput="onLen(this.value)">
      <span class="pg-val" id="lenVal">16</span>
    </div>
  </div>

  <div class="pg-toggles">
    <div class="pg-toggle" onclick="toggle('upper')">
      <div><div class="pg-toggle-label">Uppercase</div><div class="pg-toggle-sub">A B C … Z</div></div>
      <div class="pg-switch on" id="sw-upper"></div>
    </div>
    <div class="pg-toggle" onclick="toggle('lower')">
      <div><div class="pg-toggle-label">Lowercase</div><div class="pg-toggle-sub">a b c … z</div></div>
      <div class="pg-switch on" id="sw-lower"></div>
    </div>
    <div class="pg-toggle" onclick="toggle('numbers')">
      <div><div class="pg-toggle-label">Numbers</div><div class="pg-toggle-sub">0 1 2 … 9</div></div>
      <div class="pg-switch on" id="sw-numbers"></div>
    </div>
    <div class="pg-toggle" onclick="toggle('symbols')">
      <div><div class="pg-toggle-label">Symbols</div><div class="pg-toggle-sub">! @ # $ % ^ & *</div></div>
      <div class="pg-switch" id="sw-symbols"></div>
    </div>
    <div class="pg-toggle" onclick="toggle('ambiguous')">
      <div><div class="pg-toggle-label">Exclude ambiguous</div><div class="pg-toggle-sub">Removes 0 O l I 1</div></div>
      <div class="pg-switch" id="sw-ambiguous"></div>
    </div>
  </div>

  <button class="pg-regen" onclick="generate()">Regenerate password</button>
</div>

<script>
  const CHARS = {
    upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lower: 'abcdefghijklmnopqrstuvwxyz',
    numbers: '0123456789',
    symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
  };
  const AMBIGUOUS = new Set(['0','O','l','I','1']);
  const state = { upper: true, lower: true, numbers: true, symbols: false, ambiguous: false, len: 16 };

  function getPool() {
    let p = '';
    if (state.upper) p += CHARS.upper;
    if (state.lower) p += CHARS.lower;
    if (state.numbers) p += CHARS.numbers;
    if (state.symbols) p += CHARS.symbols;
    if (state.ambiguous) p = [...p].filter(c => !AMBIGUOUS.has(c)).join('');
    return p || CHARS.lower;
  }

  function generate() {
    const pool = getPool();
    const arr = new Uint32Array(state.len);
    crypto.getRandomValues(arr);
    const pw = Array.from(arr).map(n => pool[n % pool.length]).join('');
    document.getElementById('pw').textContent = pw;
    updateStrength(pw, pool);
  }

  function updateStrength(pw, pool) {
    const entropy = Math.floor(pw.length * Math.log2(pool.length));
    document.getElementById('mEntropy').textContent = entropy;
    document.getElementById('mPool').textContent = pool.length;

    let pct, label, color, timeStr;
    if (entropy < 28)      { pct = 10; label = 'Very weak'; color = '#E24B4A'; timeStr = 'Instant'; }
    else if (entropy < 40) { pct = 30; label = 'Weak'; color = '#EF9F27'; timeStr = 'Minutes'; }
    else if (entropy < 56) { pct = 55; label = 'Fair'; color = '#BA7517'; timeStr = 'Days'; }
    else if (entropy < 72) { pct = 75; label = 'Strong'; color = '#1D9E75'; timeStr = 'Years'; }
    else                   { pct = 100; label = 'Very strong'; color = '#0F6E56'; timeStr = 'Centuries'; }

    const bar = document.getElementById('sBar');
    bar.style.width = pct + '%';
    bar.style.background = color;
    document.getElementById('sLabel').textContent = label;
    document.getElementById('sLabel').style.color = color;
    document.getElementById('mTime').textContent = timeStr;
  }

  function toggle(key) {
    state[key] = !state[key];
    const sw = document.getElementById('sw-' + key);
    if (state[key]) sw.classList.add('on'); else sw.classList.remove('on');
    generate();
  }

  function onLen(v) {
    state.len = parseInt(v);
    document.getElementById('lenVal').textContent = v;
    generate();
  }

  function copyPw() {
    const pw = document.getElementById('pw').textContent;
    navigator.clipboard.writeText(pw).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1800);
    });
  }

  generate();
</script>
